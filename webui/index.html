<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rho</title>
<style>
  :root {
    --bg: #14161a; --panel: #1c1f26; --panel2: #23272f; --text: #d8dce4;
    --dim: #8a919e; --accent: #6aa1ff; --green: #6fce8b; --red: #e0716f;
    --amber: #e0b56f; --border: #2c313a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; background: var(--bg);
    color: var(--text); font: 14px/1.5 system-ui, sans-serif;
  }
  #rail {
    width: 280px; min-width: 280px; border-right: 1px solid var(--border);
    background: var(--panel); display: flex; flex-direction: column;
  }
  #rail-head {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  #rail-head b { font-size: 15px; }
  #agents { overflow-y: auto; flex: 1; padding: 6px; }
  .topic-name {
    margin: 10px 6px 4px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .08em; color: var(--dim);
  }
  .agent {
    display: flex; align-items: center; gap: 8px; padding: 7px 8px;
    border-radius: 8px; cursor: pointer; border: 1px solid transparent;
  }
  .agent:hover { background: var(--panel2); }
  .agent.selected { background: var(--panel2); border-color: var(--border); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a5261; flex: none; }
  .dot.working { background: var(--accent); animation: pulse 1.2s infinite; }
  .dot.pending { background: var(--amber); }
  .dot.needs_input { background: var(--red); }
  @keyframes pulse { 50% { opacity: .35; } }
  .agent-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .agent-mode { color: var(--dim); font-size: 11px; }
  button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font: inherit;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #10131a; border: none; font-weight: 600; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #status-bar {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center; min-height: 41px;
  }
  #status-label { color: var(--dim); font-size: 13px; }
  #transcript { flex: 1; overflow-y: auto; padding: 16px; }
  .block { max-width: 860px; margin: 0 auto 10px; white-space: pre-wrap; word-break: break-word; }
  .block.user {
    background: #23303f; border-radius: 10px; padding: 8px 12px;
    border-left: 3px solid var(--accent);
  }
  .block.assistant { padding: 4px 2px; }
  .block.assistant.final { border-left: 3px solid var(--green); padding-left: 10px; }
  .block.reasoning, .block.notice, .block.queued { color: var(--dim); font-size: 13px; padding: 2px; }
  .block.agent_message { color: var(--amber); padding: 2px; }
  details.tool {
    max-width: 860px; margin: 0 auto 10px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px;
  }
  details.tool summary { cursor: pointer; color: var(--dim); font-size: 13px; }
  details.tool summary .tool-ok { color: var(--green); }
  details.tool summary .tool-err { color: var(--red); }
  details.tool summary .tool-run { color: var(--accent); }
  details.tool pre {
    margin: 6px 0 2px; overflow-x: auto; font-size: 12px; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }
  #composer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #composer textarea, dialog textarea, dialog select {
    flex: 1; background: var(--panel); color: var(--text); resize: none;
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit;
  }
  #empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--dim); }
  dialog {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; width: 480px;
  }
  dialog::backdrop { background: rgba(0,0,0,.5); }
  dialog form { display: flex; flex-direction: column; gap: 10px; }
  #conn { font-size: 12px; color: var(--dim); }
  #toast {
    position: fixed; bottom: 16px; right: 16px; background: var(--red); color: #10131a;
    padding: 8px 14px; border-radius: 8px; display: none; max-width: 420px;
  }
</style>
</head>
<body>
  <div id="rail">
    <div id="rail-head">
      <b>rho</b>
      <span id="conn" title="Click to change the daemon address" style="cursor:pointer">connecting…</span>
      <button id="new-agent-btn" title="New agent">+ new</button>
    </div>
    <div id="agents"></div>
  </div>
  <div id="main">
    <div id="status-bar">
      <span id="status-label">no agent selected</span>
      <span style="flex:1"></span>
      <button id="cancel-btn" style="display:none">cancel turn</button>
    </div>
    <div id="empty">Select an agent, or create one.</div>
    <div id="transcript" style="display:none"></div>
    <div id="composer" style="display:none">
      <textarea id="input" rows="2" placeholder="Message the agent… (Enter to send)"></textarea>
      <button id="send-btn" class="primary">Send</button>
    </div>
  </div>

  <dialog id="new-agent-dialog">
    <form method="dialog">
      <b>New agent</b>
      <select id="repo-select"></select>
      <textarea id="new-agent-text" rows="4" placeholder="First message / task…"></textarea>
      <div style="display:flex; gap:8px; justify-content:flex-end">
        <button value="cancel">Cancel</button>
        <button value="create" class="primary" id="create-btn">Create</button>
      </div>
    </form>
  </dialog>
  <div id="toast"></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
let ws = null;
let topics = [], workdirs = [];
let selected = null;
let pendingSelect = null; // auto-select the agent we just created

// Static page, hostable anywhere: the daemon address comes from ?daemon=,
// a previously saved choice, or the localhost default. Browsers permit
// ws:// to 127.0.0.1 even from an https page.
function daemonUrl() {
  const fromQuery = new URLSearchParams(location.search).get("daemon");
  if (fromQuery) localStorage.setItem("rho-daemon-url", fromQuery);
  return localStorage.getItem("rho-daemon-url") || "ws://127.0.0.1:9190/ws";
}
$("conn").onclick = () => {
  const url = prompt("rho daemon WebSocket URL", daemonUrl());
  if (!url) return;
  localStorage.setItem("rho-daemon-url", url);
  if (ws) ws.close(); else connect();
};

function connect() {
  ws = new WebSocket(daemonUrl());
  ws.onopen = () => { $("conn").textContent = "connected"; };
  ws.onclose = () => {
    $("conn").textContent = "reconnecting…";
    setTimeout(connect, 1500);
  };
  ws.onmessage = (event) => handle(JSON.parse(event.data));
}
function send(message) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(message));
}

function handle(message) {
  if (message.type === "hello") {
    topics = message.topics;
    workdirs = message.workdirs;
    renderRail();
    renderRepos();
    if (pendingSelect && allAgents().some((agent) => agent.id === pendingSelect)) {
      select(pendingSelect);
      pendingSelect = null;
    }
  } else if (message.type === "agent") {
    if (message.agent_id === selected) renderAgent(message.state);
  } else if (message.type === "agent_created") {
    pendingSelect = message.agent_id;
  } else if (message.type === "error") {
    toast(message.message);
  }
}

function allAgents() {
  return topics.flatMap((topic) => topic.agents);
}

function renderRail() {
  const rail = $("agents");
  rail.textContent = "";
  for (const topic of topics) {
    const agents = topic.agents.filter((agent) => !agent.hidden);
    if (!agents.length) continue;
    const name = document.createElement("div");
    name.className = "topic-name";
    name.textContent = topic.name;
    rail.appendChild(name);
    for (const agent of agents) {
      const row = document.createElement("div");
      row.className = "agent" + (agent.id === selected ? " selected" : "");
      row.onclick = () => select(agent.id);
      const dot = document.createElement("span");
      dot.className = "dot " + agent.attention;
      dot.title = agent.attention;
      const label = document.createElement("span");
      label.className = "agent-name";
      label.textContent = agent.name;
      const mode = document.createElement("span");
      mode.className = "agent-mode";
      mode.textContent = agent.mode;
      row.append(dot, label, mode);
      rail.appendChild(row);
    }
  }
}

function renderRepos() {
  const selectEl = $("repo-select");
  selectEl.textContent = "";
  for (const workdir of workdirs) {
    const option = document.createElement("option");
    option.value = workdir.path;
    option.textContent = `${workdir.name} (${workdir.path})`;
    selectEl.appendChild(option);
  }
}

function select(agentId) {
  selected = agentId;
  renderRail();
  $("empty").style.display = "none";
  $("transcript").style.display = "";
  $("composer").style.display = "";
  $("transcript").textContent = "";
  $("status-label").textContent = "loading…";
  send({ type: "select", agent_id: agentId });
}

function renderAgent(state) {
  const transcript = $("transcript");
  const stick = transcript.scrollHeight - transcript.scrollTop - transcript.clientHeight < 60;
  transcript.textContent = "";
  for (const block of state.blocks) transcript.appendChild(renderBlock(block));
  if (stick) transcript.scrollTop = transcript.scrollHeight;

  const working = state.status === "streaming" || state.status === "tool_calling";
  const context = state.context_used ? ` · ${Math.round(state.context_used / 1000)}k ctx` : "";
  $("status-label").textContent = state.status + context;
  $("cancel-btn").style.display = working ? "" : "none";
}

function renderBlock(block) {
  if (block.kind === "tool") {
    const details = document.createElement("details");
    details.className = "tool";
    const summary = document.createElement("summary");
    const badge = document.createElement("span");
    badge.className = block.status === "success" ? "tool-ok"
      : block.status === "running" ? "tool-run" : "tool-err";
    badge.textContent = ` [${block.status}]`;
    summary.textContent = `⚙ ${block.name}`;
    summary.appendChild(badge);
    details.appendChild(summary);
    for (const [label, text] of [["", block.preview], ["output: ", block.output], ["error: ", block.error]]) {
      if (!text) continue;
      const pre = document.createElement("pre");
      pre.textContent = label + text;
      details.appendChild(pre);
    }
    return details;
  }
  const div = document.createElement("div");
  div.className = "block " + block.kind + (block.final_answer ? " final" : "");
  const prefix = { reasoning: "· ", notice: "⚠ ", queued: "⏳ queued: ", agent_message: `↩ ${block.sender || ""}: ` }[block.kind] || "";
  div.textContent = prefix + block.text;
  return div;
}

function toast(message) {
  const el = $("toast");
  el.textContent = message;
  el.style.display = "block";
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = "none"; }, 5000);
}

$("send-btn").onclick = sendMessage;
$("input").onkeydown = (event) => {
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
};
function sendMessage() {
  const text = $("input").value.trim();
  if (!text || !selected) return;
  send({ type: "send", agent_id: selected, text });
  $("input").value = "";
}

$("cancel-btn").onclick = () => { if (selected) send({ type: "cancel", agent_id: selected }); };

$("new-agent-btn").onclick = () => {
  if (!workdirs.length) { toast("no workdirs registered; add one from the GUI/CLI first"); return; }
  $("new-agent-dialog").showModal();
};
$("new-agent-dialog").onclose = () => {
  if ($("new-agent-dialog").returnValue !== "create") return;
  const text = $("new-agent-text").value.trim();
  const repo = $("repo-select").value;
  if (!text || !repo) return;
  send({ type: "new_agent", repo, text });
  $("new-agent-text").value = "";
};

connect();
</script>
</body>
</html>
