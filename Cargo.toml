[workspace]
members = [
  "crates/rho",
  "crates/rho-agent",
  "crates/rho-provider-responses",
  "crates/rho-store-cbor",
  "crates/rho-store-redb",
  "crates/rho-tool-shell",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/maan2003/rho"
rust-version = "1.89"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1"
base64 = "0.22"
dirs = { version = "6", default-features = false }
futures = "0.3"
futures-util = "0.3"
redb = "4.1.0"
rho = { path = "crates/rho" }
rho-agent = { path = "crates/rho-agent" }
rho-provider-responses = { path = "crates/rho-provider-responses" }
rho-store-cbor = { path = "crates/rho-store-cbor" }
rho-store-redb = { path = "crates/rho-store-redb" }
rho-tool-shell = { path = "crates/rho-tool-shell" }
serde = { version = "1", features = ["derive"] }
serde_cbor = "0.11"
serde_json = "1"
tempfile = { version = "3", default-features = false }
tokio = { version = "1", features = [
  "fs",
  "io-util",
  "macros",
  "net",
  "process",
  "rt",
  "rt-multi-thread",
  "sync",
  "time",
] }
tokio-tungstenite = { version = "0.29", default-features = false, features = [
  "connect",
  "handshake",
  "rustls-tls-native-roots",
] }
ureq = { version = "3", default-features = false, features = [
  "platform-verifier",
  "rustls",
] }
url = { version = "2", default-features = false }

[profile.ci]
debug = "line-tables-only"
incremental = false
inherits = "dev"
lto = "off"
